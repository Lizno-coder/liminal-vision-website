<svg viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="appleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2997ff"/>
      <stop offset="100%" stop-color="#5856d6"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bgGrad)"/>
  
  <!-- G -->
  <g transform="translate(90, 90)">
    <!-- Eye shape -->
    <path d="M-60 0c34-51 86-51 120 0" stroke="url(#appleGrad)" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M-60 0c34 51 86 51 120 0" stroke="url(#appleGrad)" stroke-width="10" stroke-linecap="round" fill="none"/>
    
    <!-- Iris -->
    <polygon points="0,-30 35,0 0,30 -35,0" fill="url(#appleGrad)" opacity="0.95"/>
    
    <!-- Pupil -->
    <circle cx="0" cy="0" r="12" fill="#2997ff"/>
    
    <!-- Vision lines -->
    <path d="M0 -75v20" stroke="url(#appleGrad)" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <path d="M0 55v20" stroke="url(#appleGrad)" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>