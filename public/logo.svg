<svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="visionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2997ff"/>
      <stop offset="100%" stop-color="#5856d6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer shape - stylized eye formed by two curved lines that don't meet -->
  <path d="M6 22c8-12 24-12 32 0" stroke="url(#visionGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M6 22c8 12 24 12 32 0" stroke="url(#visionGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  
  <!-- Inner iris - geometric/abstract, not circular -->
  <polygon points="22,14 28,22 22,30 16,22" fill="url(#visionGrad)" opacity="0.9"/>
  
  <!-- Central point - pupil -->
  <circle cx="22" cy="22" r="3" fill="#2997ff"/>
  
  <!-- Accent lines suggesting perception/scanning -->
  <path d="M22 4v6" stroke="url(#visionGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M22 34v6" stroke="url(#visionGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>